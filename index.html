<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Anime Huyền Thoại — 60 Siêu Phẩm (Full Info)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff477e; --secondary: #6930c3; --accent: #64dfdf;
            --dark-bg: #0a0820; --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1); --text-light: #f8f9fa;
        }

        body {
            margin: 0; background: var(--dark-bg); color: var(--text-light);
            font-family: 'Nunito', sans-serif; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, #1a1638 0%, #0a0820 100%);
            background-attachment: fixed;
        }

        header { text-align: center; padding: 4rem 1rem; position: relative; }
        header h1 { 
            font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 8vw, 5rem); margin: 0;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #sakura-container { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .petal { position: absolute; background: #ffb7b2; border-radius: 15px 0; opacity: 0.4; animation: fall linear infinite; }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        .controls { position: sticky; top: 0; z-index: 100; background: rgba(10, 8, 32, 0.85); backdrop-filter: blur(20px); padding: 1rem; border-bottom: 1px solid var(--card-border); }
        .search-box { max-width: 600px; margin: 0 auto; width: 100%; }
        #search { width: 100%; padding: 12px 20px; border-radius: 30px; border: 1px solid var(--card-border); background: rgba(255,255,255,0.05); color: #fff; outline: none; }

        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; padding: 2rem 5%; max-width: 1500px; margin: 0 auto; }
        .anime-card { background: var(--card-bg); border-radius: 20px; border: 1px solid var(--card-border); overflow: hidden; transition: 0.4s; position: relative; display: flex; flex-direction: column; }
        .anime-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .img-box { aspect-ratio: 2/3; background: #161331; position: relative; overflow: hidden; }
        .anime-img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 0.8s ease; }
        .anime-img.loaded { opacity: 1; }
        .img-box.ready::before { display: none; }

        .badge { position: absolute; top: 12px; right: 12px; background: var(--primary); padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; z-index: 2; }
        
        .info { padding: 18px; flex-grow: 1; display: flex; flex-direction: column; }
        .title { font-size: 1.1rem; margin: 0 0 10px; color: #fff; height: 2.6em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: auto; }
        .btn { padding: 8px 5px; font-size: 0.75rem; text-align: center; text-decoration: none; border-radius: 10px; font-weight: 700; transition: 0.3s; border: 1px solid transparent; }
        
        .btn-trailer { background: #ff0000; color: #fff; }
        .btn-trailer:hover { background: #cc0000; }
        
        .btn-detail { background: rgba(255,255,255,0.1); color: #fff; border-color: var(--card-border); }
        .btn-detail:hover { background: var(--secondary); border-color: transparent; }

        @media (max-width: 600px) { 
            .anime-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
            .btn-group { grid-template-columns: 1fr; }
            .title { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div id="sakura-container"></div>

    <header>
        <h1>ANIME HUYỀN THOẠI</h1>
        <p>60 tuyệt tác có sẵn Trailer và Thông tin chi tiết</p>
    </header>

    <div class="controls">
        <div class="search-box">
            <input id="search" type="search" placeholder="Tìm kiếm phim..." />
        </div>
    </div>

    <main class="anime-grid" id="grid"></main>

    <script>
        const ANIME_LIST = [
            { title: "Jujutsu Kaisen", malId: 40748, badge: "Top 1 🔥" },
            { title: "Sousou no Frieren", malId: 52991, badge: "9.3 ⭐" },
            { title: "Kimetsu no Yaiba", malId: 38000, badge: "Trending" },
            { title: "Violet Evergarden", malId: 33352, badge: "Masterpiece" },
            { title: "Attack on Titan", malId: 16498, badge: "Epic ⚔️" },
            { title: "Your Name", malId: 32281, badge: "Best Movie" },
            { title: "Spy x Family", malId: 50265, badge: "Hài hước" },
            { title: "Cyberpunk: Edgerunners", malId: 42310, badge: "Sci-Fi" },
            { title: "One Piece", malId: 21, badge: "Huyền thoại" },
            { title: "Chainsaw Man", malId: 44511, badge: "Kinh dị" },
            { title: "Oshi no Ko", malId: 52034, badge: "Idol" },
            { title: "Bleach: TYBW", malId: 41467, badge: "Chiến đấu" },
            { title: "Steins;Gate", malId: 9253, badge: "Hack não" },
            { title: "Vinland Saga", malId: 37521, badge: "Viking" },
            { title: "Mob Psycho 100", malId: 32182, badge: "Độc lạ" },
            { title: "Fullmetal Alchemist: B", malId: 5114, badge: "Số 1 MAL" },
            { title: "Hunter x Hunter 2011", malId: 11061, badge: "Kịch tính" },
            { title: "Solo Leveling", malId: 52299, badge: "Hype 🔥" },
            { title: "Haikyuu!!", malId: 20464, badge: "Thể thao" },
            { title: "Spirited Away", malId: 199, badge: "Ghibli" },
            { title: "Naruto Shippuden", malId: 1735, badge: "Ninja" },
            { title: "Death Note", malId: 1535, badge: "Trí tuệ" },
            { title: "Code Geass", malId: 1575, badge: "Chiến thuật" },
            { title: "Tokyo Ghoul", malId: 22319, badge: "Kinh dị" },
            { title: "My Hero Academia", malId: 31964, badge: "Anh hùng" },
            { title: "Re:Zero", malId: 31240, badge: "Isekai" },
            { title: "Made in Abyss", malId: 34599, badge: "Bí ẩn" },
            { title: "Cowboy Bebop", malId: 1, badge: "Cổ điển" },
            { title: "Evangelion", malId: 30, badge: "Bi kịch" },
            { title: "Mushoku Tensei", malId: 39535, badge: "Isekai" },
            { title: "K-On!", malId: 5680, badge: "Âm nhạc" },
            { title: "The Promised Neverland", malId: 37779, badge: "Trốn thoát" },
            { title: "Dr. Stone", malId: 38691, badge: "Khoa học" },
            { title: "My Neighbor Totoro", malId: 523, badge: "Ghibli" },
            { title: "Princess Mononoke", malId: 164, badge: "Thiên nhiên" },
            { title: "Howl's Moving Castle", malId: 431, badge: "Phép thuật" },
            { title: "Suzume", malId: 50594, badge: "2023 ✨" },
            { title: "Weathering With You", malId: 38826, badge: "Tình yêu" },
            { title: "Black Clover", malId: 34572, badge: "Ma pháp" },
            { title: "Dragon Ball Z", malId: 813, badge: "Huyền thoại" },
            { title: "Monster", malId: 19, badge: "Tâm lý" },
            { title: "Your Lie in April", malId: 23273, badge: "Cảm động" },
            { title: "86 Eighty-Six", malId: 41433, badge: "Chiến tranh" },
            { title: "Blue Lock", malId: 49596, badge: "Bóng đá" },
            { title: "Parasyte", malId: 22535, badge: "Ký sinh" },
            { title: "Psycho-Pass", malId: 13601, badge: "Hình sự" },
            { title: "GTO", malId: 245, badge: "Thầy giáo" },
            { title: "Ranking of Kings", malId: 40834, badge: "Ý nghĩa" },
            { title: "Clannad: After Story", malId: 4181, badge: "Khóc" },
            { title: "Great Pretender", malId: 40052, badge: "Siêu trộm" },
            { title: "Initial D", malId: 185, badge: "Đua xe" },
            { title: "Gintama", malId: 918, badge: "Bựa" },
            { title: "Monogatari Series", malId: 5081, badge: "Lạ" },
            { title: "Samurai Champloo", malId: 205, badge: "Chất" },
            { title: "Mushishi", malId: 457, badge: "Bình yên" },
            { title: "Mob Psycho 100 III", malId: 50172, badge: "Kết thúc" },
            { title: "Hell's Paradise", malId: 46569, badge: "Ninja" },
            { title: "Fruits Basket (2019)", malId: 38680, badge: "12 Con giáp" },
            { title: "Erased", malId: 31043, badge: "Quá khứ" },
            { title: "Hellsing Ultimate", malId: 777, badge: "Vampire" }
        ];

        const grid = document.getElementById('grid');
        let requestQueue = [];

        function render() {
            grid.innerHTML = ANIME_LIST.map((anime, index) => `
                <article class="anime-card">
                    <div class="img-box" id="box-${index}">
                        <span class="badge">${anime.badge}</span>
                        <img class="anime-img" data-title="${anime.title}" id="img-${index}" />
                    </div>
                    <div class="info">
                        <h2 class="title">${anime.title}</h2>
                        <div class="btn-group">
                            <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(anime.title + ' official trailer')}" 
                               target="_blank" class="btn btn-trailer">▶ Trailer</a>
                            <a href="https://myanimelist.net/anime/${anime.malId}" 
                               target="_blank" class="btn btn-detail">ℹ Chi tiết</a>
                        </div>
                    </div>
                </article>
            `).join('');

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target.querySelector('.anime-img');
                        if (img && !img.src) addToQueue(img);
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.anime-card').forEach(card => observer.observe(card));
        }

        function addToQueue(img) {
            if (requestQueue.includes(img)) return;
            requestQueue.push(img);
            if (requestQueue.length === 1) processQueue();
        }

        async function processQueue() {
            if (requestQueue.length === 0) return;
            const img = requestQueue[0];
            const title = img.dataset.title;
            const index = img.id.split('-')[1];

            try {
                const res = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(title)}&limit=1`);
                const json = await res.json();
                const url = json.data?.[0]?.images?.jpg?.large_image_url;
                if (url) {
                    img.src = url;
                    img.onload = () => {
                        img.classList.add('loaded');
                        document.getElementById(`box-${index}`).classList.add('ready');
                    };
                }
            } catch (e) {}

            await new Promise(r => setTimeout(r, 400)); // Khoảng nghỉ để tránh bị chặn
            requestQueue.shift();
            processQueue();
        }

        function createSakura() {
            const container = document.getElementById('sakura-container');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'petal';
                p.style.width = p.style.height = (Math.random() * 8 + 5) + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 5 + 5) + 's';
                p.style.animationDelay = (Math.random() * 5) + 's';
                container.appendChild(p);
            }
        }

        document.getElementById('search').addEventListener('input', e => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.anime-card').forEach(card => {
                const text = card.querySelector('.title').innerText.toLowerCase();
                card.style.display = text.includes(term) ? 'flex' : 'none';
            });
        });

        render();
        createSakura();
    </script>
</body>
</html>
