<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f0c29">
    <title>Anime Huyền Thoại — Tuyển Tập 40 Bộ Anime Hay Nhất</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://graphql.anilist.co">
    <link rel="preconnect" href="https://s4.anilist.co">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        /* ---------- Reset & biến màu ---------- */
        :root {
            --primary: #ff477e;
            --primary-2: #ff0055;
            --secondary: #6930c3;
            --accent: #64dfdf;
            --dark-bg: #0a0820;
            --dark-bg-2: #1a1638;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-light: #f8f9fa;
            --text-muted: #b2bec3;
            --shadow-glow: 0 10px 40px rgba(255, 71, 126, 0.25);
        }

        * { box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', 'Noto Sans JP', sans-serif;
            background: var(--dark-bg);
            background-image:
                radial-gradient(at 20% 10%, rgba(105, 48, 195, 0.35) 0px, transparent 50%),
                radial-gradient(at 80% 30%, rgba(255, 71, 126, 0.25) 0px, transparent 50%),
                radial-gradient(at 50% 90%, rgba(100, 223, 223, 0.18) 0px, transparent 50%),
                linear-gradient(180deg, #0a0820 0%, #1a1638 50%, #0f0c29 100%);
            background-attachment: fixed;
            color: var(--text-light);
            overflow-x: hidden;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ---------- Hoa anh đào ---------- */
        #sakura-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            background: linear-gradient(135deg, #ffb7b2, #ffdae0);
            border-radius: 15px 0 15px 0;
            opacity: 0.7;
            will-change: transform;
            animation: fall linear infinite;
            filter: drop-shadow(0 0 4px rgba(255, 183, 178, 0.4));
        }

        @keyframes fall {
            0% { transform: translate3d(0, -10vh, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.75; }
            90% { opacity: 0.75; }
            100% { transform: translate3d(120px, 110vh, 0) rotate(720deg); opacity: 0; }
        }

        /* ---------- Header ---------- */
        header {
            text-align: center;
            padding: 5rem 1.25rem 2rem;
            position: relative;
            z-index: 2;
        }

        .title-jp {
            font-size: 1.25rem;
            color: var(--primary);
            letter-spacing: 8px;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 18px rgba(255, 71, 126, 0.6);
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(255, 71, 126, 0.4); }
            to   { text-shadow: 0 0 24px rgba(255, 71, 126, 0.9), 0 0 40px rgba(105, 48, 195, 0.5); }
        }

        header h1 {
            font-family: 'Bebas Neue', 'Nunito', sans-serif;
            font-size: clamp(2.4rem, 6vw, 4.5rem);
            margin: 0;
            font-weight: 900;
            background: linear-gradient(120deg, #ffb7b2 0%, #ff477e 45%, #6930c3 75%, #64dfdf 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.05;
            animation: shine 6s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        header p {
            font-size: clamp(0.95rem, 2vw, 1.15rem);
            color: #d1d8e0;
            margin: 1rem auto 0;
            max-width: 640px;
            line-height: 1.6;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        .stat-pill {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 0.4rem 1rem;
            border-radius: 999px;
            font-size: 0.85rem;
            color: #e0e0e0;
        }

        .stat-pill strong { color: var(--primary); }

        /* ---------- Controls (Search & Filter) ---------- */
        .controls {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(10, 8, 32, 0.7);
            backdrop-filter: blur(16px) saturate(1.4);
            -webkit-backdrop-filter: blur(16px) saturate(1.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 1rem 1.25rem;
            margin-top: 1rem;
        }

        .controls-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-wrap {
            position: relative;
            flex: 1 1 280px;
            min-width: 0;
        }

        .search-wrap svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        #search {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: all 0.25s ease;
        }

        #search:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 71, 126, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        #search::placeholder { color: var(--text-muted); }

        .filter-scroll {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            flex: 1 1 100%;
            padding-bottom: 2px;
        }

        .filter-scroll::-webkit-scrollbar { display: none; }

        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #d1d8e0;
            padding: 0.4rem 0.9rem;
            border-radius: 999px;
            font-size: 0.82rem;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.25s ease;
            flex-shrink: 0;
        }

        .filter-btn:hover { color: #fff; background: rgba(255, 255, 255, 0.1); }

        .filter-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 14px rgba(255, 71, 126, 0.4);
        }

        /* ---------- Grid ---------- */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
            padding: 2rem 5% 4rem;
            max-width: 1500px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        @media (min-width: 1200px) {
            .anime-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.75rem; }
        }

        /* ---------- Card ---------- */
        .anime-card {
            background: var(--card-bg);
            border-radius: 18px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease, border-color 0.3s ease;
            position: relative;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(24px);
            will-change: transform, opacity;
        }

        .anime-card.visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease, border-color 0.3s ease;
        }

        @media (hover: hover) {
            .anime-card:hover {
                transform: translateY(-10px);
                border-color: rgba(255, 71, 126, 0.6);
                box-shadow: var(--shadow-glow), 0 24px 50px rgba(0, 0, 0, 0.5);
            }
            .anime-card:hover .anime-img { transform: scale(1.08); }
            .anime-card:hover .img-shimmer { opacity: 1; }
        }

        .img-container {
            position: relative;
            overflow: hidden;
            aspect-ratio: 2 / 3;
            background: linear-gradient(110deg, #1a1638 30%, #2a2150 50%, #1a1638 70%);
            background-size: 200% 100%;
            animation: skeleton 1.6s ease-in-out infinite;
        }

        @keyframes skeleton {
            to { background-position: -200% 0; }
        }

        .img-container.loaded {
            background: #1a1638;
            animation: none;
        }

        .anime-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease;
            opacity: 0;
            display: block;
        }

        .anime-img.loaded { opacity: 1; }

        .img-shimmer {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 50%, rgba(15, 12, 41, 0.95) 100%);
            pointer-events: none;
            opacity: 0.85;
            transition: opacity 0.3s ease;
        }

        .badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: linear-gradient(135deg, #ff477e, #ff0055);
            color: white;
            padding: 5px 12px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 0.78rem;
            box-shadow: 0 4px 14px rgba(255, 71, 126, 0.45);
            z-index: 3;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        .rating {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #ffd700;
            padding: 4px 10px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 0.78rem;
            z-index: 3;
            border: 1px solid rgba(255, 215, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .anime-info {
            padding: 1.1rem 1.1rem 1.2rem;
            position: relative;
            z-index: 2;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .anime-title {
            font-size: 1.1rem;
            margin: 0;
            color: #fff;
            line-height: 1.25;
            font-weight: 900;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .anime-meta {
            display: flex;
            gap: 0.6rem;
            align-items: center;
            font-size: 0.78rem;
            color: var(--text-muted);
            flex-wrap: wrap;
        }

        .anime-meta .dot { width: 3px; height: 3px; background: var(--text-muted); border-radius: 50%; }

        .anime-genres {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .genre {
            font-size: 0.7rem;
            background: rgba(105, 48, 195, 0.35);
            padding: 3px 9px;
            border-radius: 999px;
            border: 1px solid rgba(105, 48, 195, 0.5);
            color: #e0d6ff;
            font-weight: 700;
        }

        .anime-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.55;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin: 0;
            flex-grow: 1;
        }

        .watch-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 18px;
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.88rem;
            transition: all 0.3s ease;
            margin-top: 0.4rem;
            position: relative;
            overflow: hidden;
        }

        .watch-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            transform: translateX(-101%);
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: -1;
        }

        .watch-btn:hover {
            color: #fff;
            border-color: transparent;
            box-shadow: 0 8px 24px rgba(255, 71, 126, 0.45);
        }

        .watch-btn:hover::before { transform: translateX(0); }

        /* ---------- Empty state ---------- */
        .empty {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-muted);
            font-size: 1.05rem;
            grid-column: 1 / -1;
            display: none;
        }

        /* ---------- Footer ---------- */
        footer {
            text-align: center;
            padding: 2.5rem 1rem 3.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            position: relative;
            z-index: 1;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        footer .heart { color: var(--primary); display: inline-block; animation: beat 1.2s ease-in-out infinite; }
        @keyframes beat { 50% { transform: scale(1.25); } }

        /* ---------- Back to top ---------- */
        #back-to-top {
            position: fixed;
            right: 18px;
            bottom: 18px;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: #fff;
            cursor: pointer;
            z-index: 50;
            box-shadow: 0 8px 24px rgba(255, 71, 126, 0.5);
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            display: grid;
            place-items: center;
        }

        #back-to-top.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        /* ---------- Mobile tuning ---------- */
        @media (max-width: 640px) {
            header { padding: 3.5rem 1rem 1.5rem; }
            .anime-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.9rem;
                padding: 1.25rem 0.9rem 3rem;
            }
            .anime-info { padding: 0.85rem 0.85rem 1rem; gap: 0.45rem; }
            .anime-title { font-size: 0.92rem; }
            .anime-desc { font-size: 0.78rem; -webkit-line-clamp: 2; }
            .genre { font-size: 0.62rem; padding: 2px 7px; }
            .badge { font-size: 0.65rem; padding: 3px 9px; top: 8px; right: 8px; }
            .rating { font-size: 0.65rem; padding: 3px 8px; top: 8px; left: 8px; }
            .watch-btn { padding: 8px 12px; font-size: 0.78rem; }
            .anime-meta { font-size: 0.7rem; }
            .controls { padding: 0.75rem 0.9rem; }
            #search { font-size: 0.88rem; padding: 0.6rem 0.85rem 0.6rem 2.3rem; }
            .filter-btn { font-size: 0.72rem; padding: 0.35rem 0.75rem; }
            #back-to-top { width: 42px; height: 42px; right: 12px; bottom: 12px; }
        }

        @media (max-width: 380px) {
            .anime-grid { grid-template-columns: 1fr; }
        }

        /* ---------- Giảm chuyển động cho user thích ít chuyển động ---------- */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .petal { display: none; }
        }
    </style>
</head>
<body>

    <div id="sakura-container" aria-hidden="true"></div>

    <header>
        <div class="title-jp">おすすめアニメ</div>
        <h1>Anime Huyền Thoại</h1>
        <p>Tuyển tập 40 bộ anime với hình ảnh và nội dung xuất sắc nhất mọi thời đại — từ kinh điển đến hiện đại.</p>
        <div class="stats-bar">
            <div class="stat-pill"><strong id="count-total">40</strong> bộ phim</div>

    <div class="controls">
        <div class="controls-inner">
            <div class="search-wrap">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path></svg>
                <input id="search" type="search" placeholder="Tìm anime theo tên..." autocomplete="off" />

    <button id="back-to-top" aria-label="Lên đầu trang">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
    </button>

    <footer>
        Tạo bởi <span class="heart">♥</span> &nbsp;•&nbsp; Poster từ AniList &nbsp;•&nbsp; Anime Huyền Thoại © 2026

            { q: "Violet Evergarden",        title: "Violet Evergarden",     badge: "Masterpiece 🎨", rating: 8.9, year: 2018, genres: ["Drama","Slice of Life"], desc: "Hành trình tìm hiểu ý nghĩa của cụm từ 'Anh yêu em' của một cựu chiến binh được nuôi dạy như một công cụ chiến tranh. Đồ họa đẹp nhất lịch sử." },

            { q: "Cyberpunk Edgerunners",    title: "Cyberpunk: Edgerunners", badge: "Cyberpunk 🏙️", rating: 8.6, year: 2022, genres: ["Sci-Fi","Hành động"], desc: "Câu chuyện bi tráng về một chàng trai trẻ cố gắng sống sót trong thành phố ngầm Night City ngập tràn công nghệ và sự suy đồi." },

            { q: "Dragon Ball Z",            title: "Dragon Ball Z",          badge: "Legend 🐉",   rating: 8.8, year: 1989, genres: ["Hành động","Phiêu lưu"], desc: "Son Goku cùng các chiến binh Saiyan bảo vệ Trái Đất khỏi vô số kẻ thù vũ trụ. Anime hành động định hình cả một thế hệ." }

        const grid = document.getElementById('grid');
        const emptyEl = document.getElementById('empty');
        const searchEl = document.getElementById('search');
        const filtersEl = document.getElementById('filters');

        /* ============================================================
           RENDER THẺ ANIME (skeleton trước, ảnh load sau)
           ============================================================ */
        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        function renderCards() {
            const html = ANIME_DATA.map((a, i) => `
                <article class="anime-card" data-genres="${a.genres.map(g=>g.toLowerCase()).join('|')}" data-title="${escapeHtml(a.title.toLowerCase())}" data-index="${i}">
                    <div class="img-container" data-q="${escapeHtml(a.q)}">
                        <span class="rating">★ ${a.rating.toFixed(1)}</span>
                        <span class="badge">${a.badge}</span>
                        <img class="anime-img" alt="${escapeHtml(a.title)}" loading="lazy" decoding="async" referrerpolicy="no-referrer" />
                        <div class="img-shimmer"></div>
                    </div>
                    <div class="anime-info">
                        <h2 class="anime-title">${escapeHtml(a.title)}</h2>
                        <div class="anime-meta"><span>${a.year}</span><span class="dot"></span><span>${a.genres[0]}</span></div>
                        <div class="anime-genres">${a.genres.map(g=>`<span class="genre">${escapeHtml(g)}</span>`).join('')}</div>
                        <p class="anime-desc">${escapeHtml(a.desc)}</p>
                        <a href="#" class="watch-btn">▶ Xem Ngay (見る)</a>
                    </div>
                </article>
            `).join('');
            grid.insertAdjacentHTML('afterbegin', html);
        }

        /* ============================================================
           FILTER CHIPS (từ thể loại)
           ============================================================ */
        function buildFilters() {
            const counts = { 'Tất cả': ANIME_DATA.length };
            ANIME_DATA.forEach(a => a.genres.forEach(g => counts[g] = (counts[g] || 0) + 1));
            const items = Object.entries(counts)
                .sort((a,b) => b[1]-a[1])
                .slice(0, 11);
            filtersEl.innerHTML = items.map(([g, n], i) =>
                `<button class="filter-btn ${i===0?'active':''}" data-genre="${g.toLowerCase()}">${g} <span style="opacity:.6">·${n}</span></button>`
            ).join('');
        }

        let activeGenre = 'tất cả';
        let activeSearch = '';

        function applyFilters() {
            const cards = grid.querySelectorAll('.anime-card');
            let visible = 0;
            cards.forEach(card => {
                const genres = card.dataset.genres;
                const title  = card.dataset.title;
                const matchGenre = (activeGenre === 'tất cả') || genres.includes(activeGenre);
                const matchSearch = !activeSearch || title.includes(activeSearch);
                const show = matchGenre && matchSearch;
                card.style.display = show ? '' : 'none';
                if (show) visible++;
            });
            emptyEl.style.display = visible === 0 ? 'block' : 'none';
        }

        filtersEl.addEventListener('click', e => {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;
            filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeGenre = btn.dataset.genre;
            applyFilters();
        });

        searchEl.addEventListener('input', e => {
            activeSearch = e.target.value.trim().toLowerCase();
            applyFilters();
        });

        /* ============================================================
           POSTER LOADER — dùng AniList GraphQL batched query
           Gửi 1 request lấy được toàn bộ poster → CỰC NHANH
           ============================================================ */
        async function loadPosters() {
            const containers = Array.from(grid.querySelectorAll('.img-container'));

            // Chia thành batch 10 để tránh query quá nặng
            const BATCH_SIZE = 10;
            const batches = [];
            for (let i = 0; i < containers.length; i += BATCH_SIZE) {
                batches.push(containers.slice(i, i + BATCH_SIZE));
            }

            // Map từ key alias -> phần tử để gán ảnh sau khi nhận data
            const sanitize = s => 'a' + s.replace(/[^a-zA-Z0-9]/g, '').slice(0, 40);

            // Chạy các batch song song
            await Promise.all(batches.map(async (batch, batchIdx) => {
                const aliases = batch.map((c, idx) => ({
                    alias: sanitize(c.dataset.q) + '_' + batchIdx + '_' + idx,
                    q: c.dataset.q,
                    container: c
                }));

                const queryBody = aliases.map(a =>
                    `${a.alias}: Media(search: ${JSON.stringify(a.q)}, type: ANIME, sort: SEARCH_MATCH) { coverImage { extraLarge large } }`
                ).join('\n');

                const query = `query { ${queryBody} }`;

                try {
                    const res = await fetch('https://graphql.anilist.co', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: JSON.stringify({ query })
                    });
                    if (!res.ok) throw new Error('AniList HTTP ' + res.status);
                    const json = await res.json();
                    const data = json.data || {};

                    aliases.forEach(a => {
                        const media = data[a.alias];
                        const url = media?.coverImage?.extraLarge || media?.coverImage?.large;
                        if (url) applyImage(a.container, url);
                        else fallbackJikan(a.container, a.q);
                    });
                } catch (err) {
                    console.warn('AniList batch lỗi, fallback từng phim qua Jikan:', err);
                    for (const a of aliases) await fallbackJikan(a.container, a.q);
                }
            }));
        }

        function applyImage(container, url) {
            const img = container.querySelector('.anime-img');
            if (!img) return;

            // Preload trước, chỉ khi tải xong mới swap (mượt, không chớp)
            const probe = new Image();
            probe.referrerPolicy = 'no-referrer';
            probe.onload = () => {
                img.src = url;
                requestAnimationFrame(() => {
                    img.classList.add('loaded');
                    container.classList.add('loaded');
                });
            };
            probe.onerror = () => {
                // Vẫn cố gán để trình duyệt thử lại
                img.src = url;
                container.classList.add('loaded');
                img.classList.add('loaded');
            };
            probe.src = url;
        }

        async function fallbackJikan(container, q) {
            try {
                const res = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(q)}&limit=1`);
                if (!res.ok) throw new Error('Jikan HTTP ' + res.status);
                const data = await res.json();
                const url = data?.data?.[0]?.images?.jpg?.large_image_url;
                if (url) applyImage(container, url);
            } catch (e) {
                console.error('Không tải được ảnh:', q, e);
            }
        }

        /* ============================================================
           Reveal-on-scroll cho card
           ============================================================ */
        function setupReveal() {
            const cards = grid.querySelectorAll('.anime-card');
            if (!('IntersectionObserver' in window)) {
                cards.forEach(c => c.classList.add('visible'));
                return;
            }
            const io = new IntersectionObserver(entries => {
                entries.forEach((entry, i) => {
                    if (entry.isIntersecting) {
                        entry.target.style.transitionDelay = (i * 40) + 'ms';
                        entry.target.classList.add('visible');
                        io.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.08, rootMargin: '40px' });
            cards.forEach(c => io.observe(c));
        }

        /* ============================================================
           Hoa anh đào (giảm số lượng trên mobile để tiết kiệm CPU)
           ============================================================ */
        function createSakura() {
            const container = document.getElementById('sakura-container');
            const isMobile = window.matchMedia('(max-width: 640px)').matches;
            const isLowPower = navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4;
            const petalCount = isMobile || isLowPower ? 22 : 50;
            const frag = document.createDocumentFragment();

            for (let i = 0; i < petalCount; i++) {
                const petal = document.createElement('div');
                petal.classList.add('petal');
                const size = Math.random() * 10 + 6;
                petal.style.width  = `${size}px`;
                petal.style.height = `${size}px`;
                petal.style.left   = `${Math.random() * 100}vw`;
                petal.style.animationDuration = `${Math.random() * 6 + 6}s`;
                petal.style.animationDelay    = `${Math.random() * 6}s`;
                frag.appendChild(petal);
            }
            container.appendChild(frag);
        }

        /* ============================================================
           Back-to-top
           ============================================================ */
        const backBtn = document.getElementById('back-to-top');
        window.addEventListener('scroll', () => {
            backBtn.classList.toggle('show', window.scrollY > 600);
        }, { passive: true });
        backBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

        /* ============================================================
           KHỞI CHẠY
           ============================================================ */
        renderCards();
        buildFilters();
        setupReveal();
        createSakura();
        loadPosters();
    </script>
